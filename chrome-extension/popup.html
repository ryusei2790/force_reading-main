<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Blog-Read-Forced</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: #4285f4;
      color: #fff;
      padding: 12px 16px;
      font-size: 16px;
      font-weight: bold;
    }

    main {
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* GAS URL 設定セクション */
    .section-label {
      font-size: 12px;
      color: #666;
      margin-bottom: 4px;
    }

    #gas-url-input {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      outline: none;
    }

    #gas-url-input:focus {
      border-color: #4285f4;
    }

    #interval-select {
      width: 100%;
      padding: 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 13px;
      background: #fff;
      outline: none;
      cursor: pointer;
    }

    #interval-select:focus {
      border-color: #4285f4;
    }

    /* ボタン共通 */
    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button:hover {
      opacity: 0.85;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    #save-url-btn {
      background: #34a853;
      color: #fff;
      font-size: 12px;
      padding: 7px;
    }

    #register-btn {
      background: #4285f4;
      color: #fff;
    }

    /* メッセージ */
    #message {
      font-size: 13px;
      text-align: center;
      min-height: 18px;
      color: #555;
    }

    #message.success {
      color: #34a853;
    }

    #message.error {
      color: #ea4335;
    }

    hr {
      border: none;
      border-top: 1px solid #e0e0e0;
    }

    /* 未読記事カード */
    #article-card {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      padding: 12px;
      font-size: 13px;
    }

    #article-card .card-label {
      font-size: 11px;
      color: #888;
      margin-bottom: 6px;
    }

    #article-title {
      font-weight: bold;
      color: #4285f4;
      text-decoration: none;
      display: block;
      word-break: break-all;
      line-height: 1.4;
    }

    #article-title:hover {
      text-decoration: underline;
    }

    #article-empty {
      font-size: 13px;
      color: #888;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>Blog-Read-Forced</header>
  <main>
    <!-- GAS URL 設定 -->
    <div>
      <div class="section-label">GAS ウェブアプリ URL</div>
      <input
        id="gas-url-input"
        type="url"
        placeholder="https://script.google.com/macros/s/..."
      />
      <br /><br />
      <button id="save-url-btn">URL を保存</button>
    </div>

    <!-- 通知間隔設定 -->
    <div>
      <div class="section-label">通知間隔</div>
      <select id="interval-select">
        <option value="60">1時間ごと</option>
        <option value="180">3時間ごと</option>
        <option value="360">6時間ごと</option>
        <option value="720">12時間ごと</option>
        <option value="1440">24時間ごと</option>
      </select>
    </div>

    <hr />

    <!-- 未読記事表示 -->
    <div id="article-card" style="display:none;">
      <div class="card-label">今読むべき記事（最古の未読）</div>
      <a id="article-title" href="#" target="_blank"></a>
    </div>
    <div id="article-empty" style="display:none;">未読記事はありません</div>

    <hr />

    <!-- 現在タブを登録 -->
    <button id="register-btn">この記事を登録</button>

    <!-- フィードバックメッセージ -->
    <div id="message"></div>
  </main>
  <script src="popup.js"></script>
</body>
</html>
